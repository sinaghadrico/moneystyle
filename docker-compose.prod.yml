services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: revenue
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: revenue
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revenue"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3020:3000"
    environment:
      DATABASE_URL: postgresql://revenue:${DB_PASSWORD}@db:5432/revenue
      DIRECT_URL: postgresql://revenue:${DB_PASSWORD}@db:5432/revenue
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-me-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      db:
        condition: service_healthy

  # Run once: docker compose -f docker-compose.prod.yml --profile seed up seed
  seed:
    build: .
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://revenue:${DB_PASSWORD}@db:5432/revenue
      DIRECT_URL: postgresql://revenue:${DB_PASSWORD}@db:5432/revenue
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pgdata:
