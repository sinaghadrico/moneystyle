services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: revenue
      POSTGRES_PASSWORD: revenue123
      POSTGRES_DB: revenue
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revenue"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://revenue:revenue123@db:5432/revenue
      DIRECT_URL: postgresql://revenue:revenue123@db:5432/revenue
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy

  # Run once to seed the database
  seed:
    build: .
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://revenue:revenue123@db:5432/revenue
      DIRECT_URL: postgresql://revenue:revenue123@db:5432/revenue
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pgdata:
