services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: revenue
      POSTGRES_PASSWORD: ${DB_PASSWORD:-revenue123}
      POSTGRES_DB: revenue
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revenue"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/transaction-media;
      mc anonymous set download local/transaction-media;
      exit 0;
      "

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3020:3000"
    environment:
      DATABASE_URL: postgresql://revenue:${DB_PASSWORD:-revenue123}@db:5432/revenue
      DIRECT_URL: postgresql://revenue:${DB_PASSWORD:-revenue123}@db:5432/revenue
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: transaction-media
      MINIO_USE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Run once to seed the database
  seed:
    build: .
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://revenue:${DB_PASSWORD:-revenue123}@db:5432/revenue
      DIRECT_URL: postgresql://revenue:${DB_PASSWORD:-revenue123}@db:5432/revenue
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pgdata:
  minio_data:
